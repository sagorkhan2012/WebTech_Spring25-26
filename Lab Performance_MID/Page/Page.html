<!doctype html>
<html lang="en">
  <!-- Product Management Page -->
  <!-- Unit Price Fixed = 1000 -->
  <!-- Calculation Period = 30 Days -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Management Page</title>
    <link rel="stylesheet" href="../Design/Style.css" />
  </head>
  <body>
    <div class="container">
      <h3>Product Management Page</h3>

      <label>Unit Price:</label>
      <input type="number" value="1000" readonly />

      <label>Quantity per Day:</label>
      <input type="number" id="quantity" placeholder="Enter quantity per day" />

      <label>Total Price for 30 Days:</label>
      <input type="text" id="totalPrice" value="0" readonly />
    </div>

    <script src="../JS/Validation.script"></script>
  </body>
</html>
